name: Mirror to Tencent TCR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'GHCR tag to mirror (e.g., v0.1.125-knife1-5 or 0.1.125-knife1-5)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize tag
        id: norm
        run: |
          T="${{ github.event.inputs.tag }}"
          T="${T#v}"
          echo "version=$T" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Mirror GHCR -> TCR via imagetools
        run: |
          VERSION="${{ steps.norm.outputs.version }}"
          SRC="ghcr.io/knife1/sub2api:${VERSION}"
          DST="ccr.ccs.tencentyun.com/subapi/subapi"

          echo "Source : ${SRC}"
          echo "Destination : ${DST}:${VERSION} and ${DST}:latest"

          docker buildx imagetools create \
            --tag "${DST}:${VERSION}" \
            --tag "${DST}:latest" \
            "${SRC}"

          echo
          echo "Mirror complete. Server can now pull:"
          echo "  docker pull ${DST}:${VERSION}"
