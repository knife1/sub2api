name: Mirror to Tencent TCR

on:
  # 主路径：tag push 直接触发 mirror（release.yml 已改为手动，不和此 workflow 并行）
  push:
    tags:
      - 'v*'
  # 手动补镜像后门（重新 mirror 老 tag、或 push 时 mirror 跑红了重跑）
  workflow_dispatch:
    inputs:
      tag:
        description: 'GHCR tag to mirror (e.g., v0.1.125-knife1-7)'
        required: true
        type: string

permissions:
  contents: read
  packages: read   # 给未来 GHCR pkg 改 private 时 GITHUB_TOKEN 留 pull scope

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      TCR_REGISTRY: ccr.ccs.tencentyun.com
      TCR_NAMESPACE: subapi
      TCR_IMAGE: subapi
      # 提升 secret 到 job 级 env，让 `if: env.TCR_USERNAME != ''` 哨兵生效
      # （step 级 env 在 if 求值时还没展开，会读到空串导致 step 永不执行）
      TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
      TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
    steps:
      - name: Resolve tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            T="${{ github.event.inputs.tag }}"
          else
            T="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${T#v}" >> $GITHUB_OUTPUT

      - name: Set lowercase owner
        id: lc
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Tencent TCR
        if: ${{ env.TCR_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ env.TCR_USERNAME }}
          password: ${{ env.TCR_PASSWORD }}

      - name: Mirror GHCR -> TCR via imagetools
        if: ${{ env.TCR_USERNAME != '' }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SRC="ghcr.io/${{ steps.lc.outputs.owner }}/${{ github.event.repository.name }}:${VERSION}"
          DST="${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ env.TCR_IMAGE }}"

          echo "Source : ${SRC}"
          echo "Destination : ${DST}:${VERSION} and ${DST}:latest"

          docker buildx imagetools create \
            --tag "${DST}:${VERSION}" \
            --tag "${DST}:latest" \
            "${SRC}"

          echo
          echo "Mirror complete. Server can now pull:"
          echo "  docker pull ${DST}:${VERSION}"
